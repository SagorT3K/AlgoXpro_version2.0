version: '3.8'

services:
  # Redis for cross-worker state sharing
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # Quotex Signal API (scalable workers)
  api:
    build: .
    env_file:
      - backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=${WORKER_ID:-0}
      - ANALYZER_WORKERS=8
      - REDIS_MAX_CONNECTIONS=50
      - QUOTEX_ACCOUNTS=${QUOTEX_ACCOUNTS:-[]}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always

  # Nginx load balancer + static files
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    restart: always

volumes:
  redis_data:
  nginx_logs:
